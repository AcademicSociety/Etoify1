<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General Chat | Cars 2d</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f13;
            --gold: #FFD700;
            --text-light: #ffffff;
            --panel-bg: rgba(20, 20, 30, 0.95);
            --accent: #007bff;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-light);
            font-family: 'Cairo', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #2a2a35 0%, #0f0f13 80%);
        }

        header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; box-sizing: border-box; background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--gold); z-index: 10;
        }

        header h2 { margin: 0; font-size: 18px; color: var(--gold); }

        .back-btn {
            background: #444; color: white; border: none; padding: 5px 15px;
            border-radius: 8px; cursor: pointer; font-family: 'Cairo';
        }

        #chat-container {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%; padding: 8px 12px; border-radius: 12px;
            position: relative; animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.other {
            align-self: flex-start; background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--gold);
        }

        .message.me {
            align-self: flex-end; background: var(--accent);
            border-right: 3px solid #fff;
        }

        .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 3px; color: var(--gold); }
        .message.me .sender-name { color: #eee; }

        .msg-text { font-size: 14px; line-height: 1.4; }

        .input-area {
            padding: 15px; background: rgba(20, 20, 30, 1);
            display: flex; gap: 10px; border-top: 1px solid #333;
        }

        #msg-input {
            flex-grow: 1; background: #222; border: 1px solid #444;
            color: white; padding: 10px; border-radius: 8px;
            font-family: 'Cairo'; outline: none;
        }

        #send-btn {
            background: var(--gold); color: #000; border: none;
            padding: 0 20px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-family: 'Cairo';
        }

        #send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="location.href='index.html'">🔙 عودة</button>
        <h2>💬 General Chat</h2>
        <div style="width: 60px;"></div>
    </header>

    <div id="chat-container">
        <!-- الرسائل ستظهر هنا -->
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        <button id="send-btn">إرسال</button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, query, limitToLast } 
        from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        
        const firebaseConfig = {
            apiKey: "AIzaSyBWfF2YHd8GWg5iUMlKFxnYzANLt6MSb9k",
            authDomain: "eto-host.firebaseapp.com",
            databaseURL: "https://eto-host-default-rtdb.firebaseio.com",
            projectId: "eto-host",
            storageBucket: "eto-host.firebasestorage.app",
            messagingSenderId: "722707070554",
            appId: "1:722707070554:web:c556e865af6c4a6d822263",
        };


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'general_chat');

        // جلب اسم المستخدم من localStorage (نفس المفتاح المستخدم في اللعبة)
        const username = localStorage.getItem('game_username') || "لاعب مجهول";

        const chatContainer = document.getElementById('chat-container');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        // إرسال رسالة
        function sendMessage() {
            const text = msgInput.value.trim();
            if (text === "") return;

            const newMessageRef = push(chatRef);
            set(newMessageRef, {
                username: username,
                text: text,
                timestamp: Date.now()
            });

            msgInput.value = "";
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // استلام الرسائل (آخر 50 رسالة)
        const chatQuery = query(chatRef, limitToLast(50));
        onChildAdded(chatQuery, (data) => {
            const msg = data.val();
            displayMessage(msg);
        });

        function displayMessage(msg) {
            const div = document.createElement('div');
            const isMe = msg.username === username;
            div.className = `message ${isMe ? 'me' : 'other'}`;

            div.innerHTML = `
                <div class="sender-name">${msg.username}</div>
                <div class="msg-text">${msg.text}</div>
            `;

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
