<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etoify - Web Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <style>
        :root {
            --primary-color: #1DB954;
            --primary-hover: #1ed760;
            --bg-base: #000000;
            --bg-panel: #121212;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --player-height: 90px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.3s; }

        [dir="ltr"] .song-img, [dir="ltr"] .now-playing-img { margin-left: 0; margin-right: 15px; }
        [dir="ltr"] .search-btn { margin-left: 0; margin-right: 10px; }
        [dir="ltr"] .song-actions button { margin-right: 0; margin-left: 10px; }
        [dir="ltr"] .like-btn { margin-right: 0; margin-left: 15px; }

        .app-container { display: flex; flex: 1; height: calc(100vh - var(--player-height)); padding: 10px; gap: 10px; }

        .sidebar { width: 280px; background-color: var(--bg-panel); border-radius: 10px; display: flex; flex-direction: column; padding: 20px 15px; }
        .brand { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: 800; margin-bottom: 30px; color: var(--text-main); }
        .brand i { color: var(--primary-color); font-size: 30px; }
        
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .nav-links li { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-sub); font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 15px; }
        .nav-links li:hover, .nav-links li.active { color: var(--text-main); background-color: var(--bg-hover); }
        .nav-links li i { font-size: 20px; width: 25px; text-align: center; }

        .profile-section { margin-top: auto; display: flex; align-items: center; gap: 15px; padding: 15px 10px; background-color: var(--bg-base); border-radius: 10px; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; background-color: var(--bg-hover); object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: 0.3s;}
        .profile-img:hover { border-color: var(--primary-color); }
        .profile-info { display: flex; flex-direction: column; }
        .profile-name { font-size: 14px; font-weight: bold; }
        .profile-actions span { font-size: 12px; color: var(--primary-color); cursor: pointer; }
        .profile-actions span:hover { text-decoration: underline; }

        .main-content { flex: 1; background-color: var(--bg-panel); border-radius: 10px; padding: 20px; overflow-y: auto; background: linear-gradient(to bottom, #1f1f1f, var(--bg-panel)); }
        .page-title { font-size: 32px; font-weight: 800; margin-bottom: 20px; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-container { display: flex; gap: 10px; margin-bottom: 30px; }
        .search-container input { flex: 1; padding: 15px 20px; border-radius: 25px; border: 1px solid transparent; background-color: #242424; color: white; font-size: 15px; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary-color); background-color: #2a2a2a; }
        .search-btn, .action-btn { background-color: var(--primary-color); color: black; border: none; border-radius: 25px; padding: 10px 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .search-btn:hover, .action-btn:hover { background-color: var(--primary-hover); transform: scale(1.05); }

        .song-card { display: flex; align-items: center; background-color: #181818; border-radius: 10px; padding: 15px; margin-bottom: 10px; transition: 0.3s; }
        .song-card:hover { background-color: var(--bg-hover); }
        .song-img { width: 60px; height: 60px; border-radius: 5px; background-color: #333; margin-left: 15px; background-size: cover; background-position: center; }
        .song-info { flex: 1; }
        .song-info h4 { font-size: 16px; margin-bottom: 5px; }
        .song-info p { font-size: 13px; color: var(--text-sub); }
        .song-actions button { background-color: transparent; color: var(--text-sub); border: 1px solid var(--text-sub); padding: 8px 15px; border-radius: 20px; margin-right: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .song-actions button:hover { color: white; border-color: white; }
        .song-actions .play-btn { background-color: var(--primary-color); color: black; border: none; }
        .song-actions .play-btn:hover { background-color: var(--primary-hover); }

        .settings-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px;}
        .settings-group label { font-size: 16px; font-weight: bold; }
        .settings-group select { width: 100%; max-width: 300px; padding: 12px; border-radius: 8px; background-color: #242424; color: white; border: 1px solid #333; font-size: 15px; outline: none; }
        .settings-group select:focus { border-color: var(--primary-color); }
        .settings-row { display: flex; align-items: center; gap: 15px; }

        .bottom-player { height: var(--player-height); background-color: var(--bg-base); border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .player-left, .player-right { width: 30%; display: flex; align-items: center; }
        .player-center { width: 40%; display: flex; flex-direction: column; align-items: center; }

        .now-playing-img { width: 56px; height: 56px; border-radius: 5px; background-color: #333; margin-left: 15px; background-size: cover; background-position: center; }
        .now-playing-info h4 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .now-playing-info p { font-size: 12px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .like-btn { background: none; border: none; color: var(--text-sub); font-size: 18px; cursor: pointer; margin-right: 15px; transition: 0.2s; }
        .like-btn:hover, .like-btn.active { color: var(--primary-color); }

        .player-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; }
        .control-btn { background: none; border: none; color: var(--text-sub); font-size: 16px; cursor: pointer; transition: 0.2s; }
        .control-btn:hover { color: white; }
        .play-pause-btn { width: 35px; height: 35px; background-color: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .play-pause-btn:hover { transform: scale(1.1); }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-sub); }
        .progress-bar { flex: 1; height: 4px; background-color: #4d4d4d; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { width: 0%; height: 100%; background-color: white; border-radius: 2px; transition: 0.1s; }
        .progress-bar:hover .progress-fill { background-color: var(--primary-color); }
        
        .player-right { justify-content: flex-end; gap: 15px; }
        .volume-bar { width: 100px; height: 4px; background-color: #4d4d4d; border-radius: 2px; cursor: pointer; }
        .volume-fill { width: 100%; height: 100%; background-color: white; border-radius: 2px; }
        .volume-bar:hover .volume-fill { background-color: var(--primary-color); }
        
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="window.handleAvatarUpload(event)">

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-brands fa-spotify"></i>
                <span>Etoify</span>
            </div>

            <ul class="nav-links">
                <li class="active" onclick="window.switchPage('home')"><i class="fa-solid fa-house"></i> <span data-i18n="home">الرئيسية</span></li>
                <li onclick="window.switchPage('search')"><i class="fa-solid fa-magnifying-glass"></i> <span data-i18n="search">بحث</span></li>
                <li onclick="window.switchPage('liked')"><i class="fa-solid fa-heart"></i> <span data-i18n="liked">المفضلة</span></li>
                <li onclick="window.switchPage('settings')"><i class="fa-solid fa-gear"></i> <span data-i18n="settings">الإعدادات</span></li>
            </ul>

            <div class="profile-section">
                <img src="https://via.placeholder.com/45" alt="Avatar" class="profile-img" onclick="document.getElementById('avatarUpload').click()" title="تغيير الصورة">
                <div class="profile-info">
                    <span class="profile-name" id="userName">Eng. Mohammed</span>
                    <div class="profile-actions">
                        <span onclick="window.changeName()" data-i18n="changeName">تغيير الاسم</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title" id="pageTitle" data-i18n="home_title">مرحباً بك في Etoify</h1>

            <div id="page-home" class="page active">
                <p data-i18n="home_desc">استمع لأغانيك المفضلة من يوتيوب مباشرة!</p>
            </div>

            <div id="page-search" class="page">
                <div class="search-container">
                    <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="ابحث عن أغنية أو فنان...">
                    <button class="search-btn" onclick="window.performSearch()"><i class="fa-solid fa-magnifying-glass"></i> <span data-i18n="search_btn">ابحث</span></button>
                </div>
                <div class="loader" id="searchLoader"></div>
                <div id="searchResults"></div>
            </div>

            <div id="page-liked" class="page">
                <div id="likedSongsList">
                    <p data-i18n="no_liked">لا توجد أغاني في المفضلة حتى الآن.</p>
                </div>
            </div>

            <div id="page-settings" class="page">
                <div class="settings-group">
                    <label data-i18n="prof_settings">إعدادات الحساب / Account Settings</label>
                    <div class="settings-row">
                        <img src="https://via.placeholder.com/45" alt="Avatar" class="profile-img" style="width: 60px; height: 60px;">
                        <button class="action-btn" onclick="document.getElementById('avatarUpload').click()" data-i18n="changePic">تغيير الصورة</button>
                        <button class="action-btn" onclick="window.changeName()" data-i18n="changeName">تغيير الاسم</button>
                    </div>
                </div>

                <div class="settings-group">
                    <label data-i18n="lang_label">اللغة / Language</label>
                    <select id="langSelect" onchange="window.changeLanguage(this.value)">
                        <option value="ar">العربية (Arabic)</option>
                        <option value="en">English (الإنجليزية)</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label data-i18n="quality_label">جودة الصوت / Audio Quality</label>
                    <select id="qualitySelect" onchange="window.changeQuality(this.value)">
                        <option value="high" data-i18n="q_high">عالية (High)</option>
                        <option value="medium" data-i18n="q_med" selected>متوسطة (Medium)</option>
                        <option value="low" data-i18n="q_low">منخفضة (Low)</option>
                    </select>
                </div>
            </div>
        </main>
    </div>

    <footer class="bottom-player">
        <div class="player-left">
            <div class="now-playing-img" id="playerImg"></div>
            <div class="now-playing-info">
                <h4 id="playerTitle" data-i18n="ready">جاهز للتشغيل</h4>
                <p id="playerArtist" data-i18n="select_song">اختر أغنية</p>
            </div>
            <button class="like-btn" id="playerLikeBtn" onclick="window.toggleLikeCurrent()"><i class="fa-regular fa-heart"></i></button>
        </div>

        <div class="player-center">
            <div class="player-controls">
                <button class="control-btn"><i class="fa-solid fa-backward-step"></i></button>
                <button class="control-btn play-pause-btn" onclick="window.togglePlay()">
                    <i class="fa-solid fa-play" id="playIcon"></i>
                </button>
                <button class="control-btn"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="window.seekAudio(event)">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <button class="control-btn"><i class="fa-solid fa-volume-high"></i></button>
            <div class="volume-bar" id="volumeBar" onclick="window.changeVolume(event)">
                <div class="volume-fill" id="volumeFill"></div>
            </div>
        </div>
        
        <audio id="realAudioPlayer" style="display:none;"></audio>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWfF2YHd8GWg5iUMlKFxnYzANLt6MSb9k",
            authDomain: "eto-host.firebaseapp.com",
            databaseURL: "https://eto-host-default-rtdb.firebaseio.com",
            projectId: "eto-host",
            storageBucket: "eto-host.firebasestorage.app",
            messagingSenderId: "722707070554",
            appId: "1:722707070554:web:c556e865af6c4a6d822263"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userId = localStorage.getItem('etoify_user');
        if(!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('etoify_user', userId);
        }

        let likedSongsDb = {};
        let currentSong = null;
        let isPlaying = false;
        let currentLang = 'ar';
        const audioPlayer = document.getElementById('realAudioPlayer');

        // سيرفرات Piped API لأنها بتسقط كتير (تم إضافة سيرفر قوي بديل)
        const PIPED_API_BASE = "https://pipedapi.smnz.de"; // بديل ممتاز ولا يرفض الـ CORS غالباً

        const translations = {
            ar: {
                home: "الرئيسية", search: "بحث", liked: "المفضلة", settings: "الإعدادات",
                home_title: "الرئيسية", search_title: "ابحث في يوتيوب", liked_title: "الأغاني المفضلة", settings_title: "الإعدادات",
                home_desc: "استمع لأغانيك المفضلة من يوتيوب مباشرة!", changeName: "تغيير الاسم", changePic: "تغيير الصورة",
                search_placeholder: "ابحث عن أغنية أو فنان...", search_btn: "ابحث",
                ready: "جاهز للتشغيل", select_song: "اختر أغنية", no_liked: "لا توجد أغاني في المفضلة حتى الآن.",
                lang_label: "اللغة / Language", quality_label: "جودة الصوت", q_high: "عالية", q_med: "متوسطة", q_low: "منخفضة",
                play: "تشغيل", loading: "جاري التحميل...", prof_settings: "إعدادات الحساب / Account Settings", enter_name: "أدخل اسمك الجديد:"
            },
            en: {
                home: "Home", search: "Search", liked: "Liked", settings: "Settings",
                home_title: "Home", search_title: "Search YouTube", liked_title: "Liked Songs", settings_title: "Settings",
                home_desc: "Listen to your favorite songs directly from YouTube!", changeName: "Change Name", changePic: "Change Picture",
                search_placeholder: "Search for a song or artist...", search_btn: "Search",
                ready: "Ready to play", select_song: "Select a song", no_liked: "No liked songs yet.",
                lang_label: "Language / اللغة", quality_label: "Audio Quality", q_high: "High", q_med: "Medium", q_low: "Low",
                play: "Play", loading: "Loading...", prof_settings: "Account Settings / إعدادات الحساب", enter_name: "Enter your new name:"
            }
        };

        // --- تهيئة الإعدادات والصوت المحفوظ ---
        function initSettings() {
            // تحميل الاسم
            const savedName = localStorage.getItem('etoify_user_name') || 'Eng. Mohammed';
            document.getElementById('userName').innerText = savedName;

            // تحميل الصورة
            const savedAvatar = localStorage.getItem('etoify_avatar');
            if (savedAvatar) {
                document.querySelectorAll('.profile-img').forEach(img => img.src = savedAvatar);
            }

            // تحميل الصوت
            const savedVolume = localStorage.getItem('etoify_volume') !== null ? parseFloat(localStorage.getItem('etoify_volume')) : 1;
            audioPlayer.volume = savedVolume;
            document.getElementById('volumeFill').style.width = (savedVolume * 100) + '%';
        }
        initSettings();

        // --- وظائف رفع وتغيير الصورة والاسم ---
        window.handleAvatarUpload = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const dataUrl = e.target.result;
                    localStorage.setItem('etoify_avatar', dataUrl);
                    document.querySelectorAll('.profile-img').forEach(img => img.src = dataUrl);
                };
                reader.readAsDataURL(file);
            }
        };

        window.changeName = () => {
            const promptText = translations[currentLang].enter_name;
            const newName = prompt(promptText, document.getElementById('userName').innerText);
            if (newName && newName.trim() !== "") {
                document.getElementById('userName').innerText = newName;
                localStorage.setItem('etoify_user_name', newName);
            }
        };

        // --- وظائف الفايربيز (المفضلة) ---
        const likesRef = ref(db, 'likes/' + userId);
        onValue(likesRef, (snapshot) => {
            likedSongsDb = snapshot.val() || {};
            renderLikedSongs();
            updateAllLikeButtons();
        });

        window.toggleLike = (id, title, artist, thumbnail) => {
            if (likedSongsDb[id]) {
                remove(ref(db, `likes/${userId}/${id}`));
            } else {
                set(ref(db, `likes/${userId}/${id}`), { id, title, artist, thumbnail });
            }
        };

        window.toggleLikeCurrent = () => {
            if(currentSong) {
                window.toggleLike(currentSong.id, currentSong.title, currentSong.artist, currentSong.thumbnail);
            }
        };

        function updateAllLikeButtons() {
            if (currentSong) {
                const btn = document.getElementById('playerLikeBtn');
                btn.innerHTML = likedSongsDb[currentSong.id] ? '<i class="fa-solid fa-heart" style="color:#1DB954;"></i>' : '<i class="fa-regular fa-heart"></i>';
            }
            document.querySelectorAll('.like-btn-item').forEach(btn => {
                const id = btn.dataset.id;
                btn.innerHTML = likedSongsDb[id] ? '<i class="fa-solid fa-heart" style="color:#1DB954;"></i>' : '<i class="fa-regular fa-heart"></i>';
            });
        }

        function renderLikedSongs() {
            const container = document.getElementById('likedSongsList');
            container.innerHTML = '';
            const songs = Object.values(likedSongsDb);
            if(songs.length === 0) {
                container.innerHTML = `<p data-i18n="no_liked">${translations[currentLang].no_liked}</p>`;
                return;
            }
            songs.forEach(song => {
                container.innerHTML += createSongCardHTML(song);
            });
        }

        // --- وظائف يوتيوب والتشغيل ---
        window.performSearch = async () => {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            
            document.getElementById('searchLoader').style.display = 'block';
            document.getElementById('searchResults').innerHTML = '';

            try {
                const res = await fetch(`${PIPED_API_BASE}/search?q=${encodeURIComponent(query)}&filter=music_songs`);
                if(!res.ok) throw new Error("Network Error");
                const data = await res.json();
                
                document.getElementById('searchLoader').style.display = 'none';
                
                const results = data.items.filter(item => item.type === 'stream').slice(0, 15);
                results.forEach(item => {
                    const song = {
                        id: item.url.split('watch?v=')[1],
                        title: item.title,
                        artist: item.uploaderName,
                        thumbnail: item.thumbnail
                    };
                    document.getElementById('searchResults').innerHTML += createSongCardHTML(song);
                });
                updateAllLikeButtons();
            } catch (err) {
                console.error(err);
                document.getElementById('searchLoader').style.display = 'none';
                document.getElementById('searchResults').innerHTML = '<p style="color: red;">حدث خطأ في الاتصال بالسيرفر. يرجى التأكد من تشغيل الموقع من خلال (Live Server) وليس (file:///).</p>';
            }
        };

        function createSongCardHTML(song) {
            const escapedTitle = song.title.replace(/'/g, "\\'");
            const escapedArtist = song.artist.replace(/'/g, "\\'");
            return `
                <div class="song-card">
                    <div class="song-img" style="background-image: url('${song.thumbnail}')"></div>
                    <div class="song-info">
                        <h4>${song.title}</h4>
                        <p>${song.artist}</p>
                    </div>
                    <div class="song-actions">
                        <button class="like-btn-item" data-id="${song.id}" onclick="window.toggleLike('${song.id}', '${escapedTitle}', '${escapedArtist}', '${song.thumbnail}')">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                        <button class="play-btn" onclick="window.playYTSong('${song.id}', '${escapedTitle}', '${escapedArtist}', '${song.thumbnail}')">
                            <i class="fa-solid fa-play"></i> <span data-i18n="play">${translations[currentLang].play}</span>
                        </button>
                    </div>
                </div>
            `;
        }

        window.playYTSong = async (id, title, artist, thumbnail) => {
            currentSong = { id, title, artist, thumbnail };
            document.getElementById('playerTitle').innerText = translations[currentLang].loading;
            document.getElementById('playerArtist').innerText = artist;
            document.getElementById('playerImg').style.backgroundImage = `url('${thumbnail}')`;
            updateAllLikeButtons();

            try {
                const res = await fetch(`${PIPED_API_BASE}/streams/${id}`);
                if(!res.ok) throw new Error("Stream API Error");
                const data = await res.json();
                
                const audioStreams = data.audioStreams;
                if(audioStreams && audioStreams.length > 0) {
                    audioPlayer.src = audioStreams[0].url; 
                    audioPlayer.play();
                    
                    document.getElementById('playerTitle').innerText = title;
                    document.getElementById('playIcon').className = 'fa-solid fa-pause';
                    isPlaying = true;
                }
            } catch(e) {
                console.error(e);
                document.getElementById('playerTitle').innerText = "خطأ في التشغيل (CORS/API Issue)";
            }
        };

        // --- تحكم المشغل ---
        window.togglePlay = () => {
            if(!audioPlayer.src) return;
            if(audioPlayer.paused) {
                audioPlayer.play();
                document.getElementById('playIcon').className = 'fa-solid fa-pause';
                isPlaying = true;
            } else {
                audioPlayer.pause();
                document.getElementById('playIcon').className = 'fa-solid fa-play';
                isPlaying = false;
            }
        };

        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            if(duration) {
                document.getElementById('progressFill').style.width = (current / duration) * 100 + '%';
                document.getElementById('currentTime').innerText = formatTime(current);
                document.getElementById('totalTime').innerText = formatTime(duration);
            }
        });

        window.seekAudio = (e) => {
            if(!audioPlayer.duration) return;
            const bar = document.getElementById('progressBar');
            const clickX = e.offsetX;
            const width = bar.clientWidth;
            audioPlayer.currentTime = (clickX / width) * audioPlayer.duration;
        };

        window.changeVolume = (e) => {
            const bar = document.getElementById('volumeBar');
            const clickX = e.offsetX;
            const width = bar.clientWidth;
            const vol = clickX / width;
            audioPlayer.volume = vol;
            document.getElementById('volumeFill').style.width = (vol * 100) + '%';
            
            // حفظ مستوى الصوت ليظل ثابتاً (Global)
            localStorage.setItem('etoify_volume', vol);
        };

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // --- واجهة المستخدم والتنقل واللغات ---
        window.switchPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            
            document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const titleKey = `${pageId}_title`;
            document.getElementById('pageTitle').innerText = translations[currentLang][titleKey] || translations[currentLang][pageId];
        };

        window.changeLanguage = (lang) => {
            currentLang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) el.innerText = translations[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if(translations[lang][key]) el.placeholder = translations[lang][key];
            });
            
            renderLikedSongs(); 
        };

        window.changeQuality = (quality) => {
            localStorage.setItem('etoify_quality', quality);
        };

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.performSearch();
        });
    </script>
</body>
</html>
